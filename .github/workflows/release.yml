name: Release firmware

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: python -m pip install platformio

      - name: Set firmware version from tag
        working-directory: firmware/tinys3
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          path = Path("esp32-ucs1903-poc.ino")
          source = path.read_text()
          replacement = rf'\1{json.dumps(os.environ["RELEASE_VERSION"])}'
          source, count = re.subn(
              r'(#define FIRMWARE_VERSION )"[^"]+"', replacement, source, count=1
          )
          if count != 1:
              raise SystemExit("FIRMWARE_VERSION definition not found")
          path.write_text(source)
          PY

      - name: Build versioned TinyS3 firmware
        working-directory: firmware/tinys3
        run: platformio run -e um_tinys3

      - name: Prepare release assets
        run: |
          cp firmware/tinys3/.pio/build/um_tinys3/firmware.bin leaf-lights-tinys3.bin
          sha256sum leaf-lights-tinys3.bin > SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          leaf-lights-tinys3.bin SHA256SUMS
          --verify-tag
          --generate-notes
          --title "Leaf Lights ${GITHUB_REF_NAME}"
