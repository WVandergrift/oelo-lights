name: PlatformIO

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: python -m pip install platformio

      - name: Build TinyS3 firmware
        working-directory: firmware/tinys3
        run: platformio run -e um_tinys3

      - name: Build TinyS3 USB diagnostic
        working-directory: firmware/tinys3
        run: platformio run -e um_tinys3_diagnostic
